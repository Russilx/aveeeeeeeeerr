<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bóveda de claves — Productos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12141a;
    --surface:#1c1f28;
    --surface-2:#242833;
    --line: rgba(243,241,234,0.09);
    --gold:#e3b341;
    --gold-dim: rgba(227,179,65,0.15);
    --teal:#49c5b6;
    --teal-dim: rgba(73,197,182,0.14);
    --red:#e2685a;
    --text:#f3f1ea;
    --muted:#8b909c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1100px 550px at 50% -10%, rgba(227,179,65,0.07), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 28px;
    border-bottom:1px solid var(--line);
  }
  .mark{ display:flex; align-items:center; gap:10px; }
  .mark span{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.16em;
    color:var(--muted);
    text-transform:uppercase;
  }
  #userEmail{ font-size:13px; color:var(--muted); }
  .logout{
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    padding:7px 14px;
    border-radius:7px;
    font-size:12px;
    cursor:pointer;
    margin-left:14px;
    font-family:'Inter',sans-serif;
  }
  .logout:hover{ color:var(--text); border-color:#3a3f4c; }
  .right{ display:flex; align-items:center; }

  main{
    max-width:560px;
    margin:0 auto;
    padding:56px 24px 60px;
  }

  .intro{ text-align:center; margin-bottom:40px; }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:28px;
    margin:0 0 8px;
  }
  .intro p{
    color:var(--muted);
    font-size:14px;
    margin:0;
    line-height:1.6;
  }

  .product-grid{
    display:grid;
    gap:16px;
  }
  .product-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px 26px;
    text-decoration:none;
    color:var(--text);
    transition:border-color .15s ease, transform .1s ease, background .15s ease;
  }
  .product-card:hover{
    border-color:var(--card-accent, var(--gold));
    background:var(--surface-2);
    transform:translateY(-1px);
  }
  .product-card:focus-visible{
    outline:2px solid var(--card-accent, var(--gold));
    outline-offset:3px;
  }
  .product-card.bypass{ --card-accent: var(--gold); }
  .product-card.complex{ --card-accent: var(--teal); }

  .product-info{ display:flex; align-items:center; gap:14px; }
  .product-dot{
    width:10px; height:10px;
    border-radius:50%;
    background:var(--card-accent, var(--gold));
    flex-shrink:0;
  }
  .product-text h2{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    margin:0 0 3px;
  }
  .product-text p{
    color:var(--muted);
    font-size:13px;
    margin:0;
  }
  .product-arrow{
    color:var(--muted);
    font-size:18px;
    flex-shrink:0;
  }
</style>
</head>
<body>

<header>
  <div class="mark">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="9" cy="9" r="5.5" stroke="#e3b341" stroke-width="1.6"/>
      <path d="M13 13L20.5 20.5M20.5 20.5V15.5M20.5 20.5H15.5" stroke="#e3b341" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Bóveda de claves</span>
  </div>
  <div class="right">
    <span id="userEmail"></span>
    <button class="logout" id="logoutBtn">Salir</button>
  </div>
</header>

<main>
  <div class="intro">
    <h1>Elegí un producto</h1>
    <p>Cada producto tiene su propio pool de claves. Entrá al que necesites para sacar la tuya.</p>
  </div>

  <div class="product-grid">
    <a class="product-card bypass" href="bypass.html">
      <div class="product-info">
        <span class="product-dot"></span>
        <div class="product-text">
          <h2>Bypass</h2>
          <p>1 día · Semanal · Mensual · Trimestral</p>
        </div>
      </div>
      <span class="product-arrow">→</span>
    </a>

    <a class="product-card complex" href="complex.html">
      <div class="product-info">
        <span class="product-dot"></span>
        <div class="product-text">
          <h2>Complex</h2>
          <p>1 día · Semanal · Mensual · Trimestral · Permanente</p>
        </div>
      </div>
      <span class="product-arrow">→</span>
    </a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const userEmail = document.getElementById('userEmail');
  const logoutBtn = document.getElementById('logoutBtn');

  async function requireSession(){
    const { data } = await sb.auth.getSession();
    if (!data.session) {
      window.location.href = 'index.html';
      return null;
    }
    return data.session;
  }

  logoutBtn.addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });

  (async function init(){
    const session = await requireSession();
    if (!session) return;
    userEmail.textContent = session.user.email;
  })();
</script>
</body>
</html>
