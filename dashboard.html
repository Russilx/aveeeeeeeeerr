<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bóveda de claves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12141a;
    --surface:#1c1f28;
    --surface-2:#242833;
    --line: rgba(243,241,234,0.09);
    --gold:#e3b341;
    --gold-dim: rgba(227,179,65,0.15);
    --teal:#49c5b6;
    --teal-dim: rgba(73,197,182,0.14);
    --text:#f3f1ea;
    --muted:#8b909c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1100px 550px at 50% -10%, rgba(227,179,65,0.07), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 28px;
    border-bottom:1px solid var(--line);
  }
  .mark{ display:flex; align-items:center; gap:10px; }
  .mark span{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.16em;
    color:var(--muted);
    text-transform:uppercase;
  }
  #userEmail{ font-size:13px; color:var(--muted); }
  .logout{
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    padding:7px 14px;
    border-radius:7px;
    font-size:12px;
    cursor:pointer;
    margin-left:14px;
    font-family:'Inter',sans-serif;
  }
  .logout:hover{ color:var(--text); border-color:#3a3f4c; }
  .right{ display:flex; align-items:center; }

  main{
    max-width:760px;
    margin:0 auto;
    padding:64px 24px 60px;
  }
  .intro{ text-align:center; margin-bottom:44px; }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:30px;
    margin:0 0 8px;
  }
  .intro p{ color:var(--muted); font-size:14px; margin:0; }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  @media (max-width: 600px){
    .grid{ grid-template-columns:1fr; }
  }

  .product-card{
    display:block;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px 28px;
    text-decoration:none;
    color:var(--text);
    transition:border-color .15s ease, transform .15s ease;
    position:relative;
    overflow:hidden;
  }
  .product-card:hover{
    border-color:var(--gold);
    transform:translateY(-2px);
  }
  .product-card:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:3px;
  }
  .product-card .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
    display:block;
  }
  .product-card h2{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:22px;
    margin:0 0 8px;
  }
  .product-card p{
    color:var(--muted);
    font-size:13px;
    margin:0 0 20px;
    line-height:1.5;
  }
  .go{
    font-size:13px;
    font-weight:600;
    color:var(--gold);
    display:flex;
    align-items:center;
    gap:6px;
  }
</style>
</head>
<body>

<header>
  <div class="mark">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="9" cy="9" r="5.5" stroke="#e3b341" stroke-width="1.6"/>
      <path d="M13 13L20.5 20.5M20.5 20.5V15.5M20.5 20.5H15.5" stroke="#e3b341" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Bóveda de claves</span>
  </div>
  <div class="right">
    <span id="userEmail"></span>
    <button class="logout" id="logoutBtn">Salir</button>
  </div>
</header>

<main>
  <div class="intro">
    <h1>¿Qué clave necesitás?</h1>
    <p>Elegí el producto para sacar una clave de su pool.</p>
  </div>

  <div class="grid">
    <a href="complex.html" class="product-card">
      <span class="eyebrow">Producto 01</span>
      <h2>Complex</h2>
      <p>Sacá una clave disponible del pool de Complex.</p>
      <span class="go">Entrar →</span>
    </a>

    <a href="bypass.html" class="product-card">
      <span class="eyebrow">Producto 02</span>
      <h2>Bypass</h2>
      <p>Sacá una clave disponible del pool de Bypass.</p>
      <span class="go">Entrar →</span>
    </a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const userEmail = document.getElementById('userEmail');
  const logoutBtn = document.getElementById('logoutBtn');

  (async function init(){
    const { data } = await sb.auth.getSession();
    if (!data.session) {
      window.location.href = 'index.html';
      return;
    }
    userEmail.textContent = data.session.user.email;
  })();

  logoutBtn.addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
